# ── Trading — Production continue (1 trade/symbole/5min) ──────────────────
trading:
  max_positions: 12             # Capacité augmentée pour multi-positions (conf>85%→4, conf>70%→3)
  max_positions_per_symbol: 4   # 4 max par symbole
  max_trades_per_day: 80        # 4 symboles × 20/jour
  max_signals_per_cycle: 10
  history_lookback_days: 3          # P2: réduit 7→3 jours (moins de contamination historique)

# ── Symbol Limits — Production ──────────────────────────────────────────
# Surcharges par rapport à default.yaml
symbol_limits:
  # XAUUSD H4 — Calibration Juin 2026: H4 marge large, risk 1.00
  XAUUSD:
    timeframe: "H4"           # H4 (H1 = -$187K/12ans → HORS-JEU)
    max_lot: 0.10
    risk_mult: 1.00           # H4 DD 6.9% → marge large (était 0.80)
    max_spread_points: 60     # élargi (était 40)
    min_score: 0.60           # P3: remonté 0.55→0.60 (filtrer signaux faibles, WR=35.6%)
    adx_thresh: 22
    allow_buys: true
    allow_shorts: true

  # BTCUSD — Calibration Juin 2026: risk_mult 0.65 (PF 1.19 permet)
  BTCUSD:
    timeframe: "H1"           # H1 — crypto 24/7
    max_lot: 0.03
    risk_mult: 0.65           # ↑ de 0.50 (PF 1.19 + DD 5.6% → peut monter)
    max_spread_points: 150
    min_score: 0.55           # Scénario A: abaissé de 0.60→0.55 pour +20% trades
    adx_thresh: 20
    allow_buys: true
    allow_shorts: true
    max_daily_loss_pct_override: 0.015   # 1.5% daily loss (plus strict)
    circuit_breaker_dd_pct_override: 0.06  # 6% DD → arrêt

  # ETHUSD — BUY-ONLY Temporaire (SELL WR=30.8% toxique)
  ETHUSD:
    timeframe: "H4"           # H4 (backtest coûts: WR 70.5%, PF 1.03, DD 7.4%)
    max_lot: 0.05             # prudent (volatilité ETH élevée)
    risk_mult: 0.50           # corrélé BTC (0.89) → risque réduit
    max_spread_points: 150    # spread large crypto
    min_score: 0.55           # Scénario A: abaissé de 0.60→0.55 pour +20% trades
    adx_thresh: 20
    allow_buys: true
    allow_shorts: true        # 🔓 DÉBLOQUÉ — SELL WR 30.8% meilleur que BUY 25%

  # EURUSD — Nouveau symbole (Juin 2026), DEUX DIRECTIONS
  EURUSD:
    timeframe: "H1"           # H1 (WR 68.6% 12ans, PF 1.12, DD 3.7%)
    max_lot: 0.10             # lot standard forex
    risk_mult: 2.00           # ↑ boost pour diluer consistency FTMO (WR 88% live, PF 10.6)
    max_spread_points: 40     # serré (EURUSD très liquide)
    min_score: 0.70           # 🔧 18 Juin: remonté 0.55→0.70 (WR 92.6% biaisé par 3 outliers)
    adx_thresh: 22
    allow_buys: true
    allow_shorts: true        # DEUX DIRECTIONS — le MOM20x3 + risk management gèrent le risque

