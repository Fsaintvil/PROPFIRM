# ============================================================================
# PRODUCTION OVERRIDES — Synchronisé 1er Juillet 2026
# ============================================================================
# Overrides minimaux pour la production.
# Les limites sont gérées par default.yaml + portfolio_controller + signal_pipeline.
# ============================================================================

# ── Corrélation — Réactivée (protection pertes corrélées) ──
correlation:
  enabled: true

# ── Trading — Synchronisé default.yaml (1er Juillet 2026) ─────────────
trading:
  max_positions: 40             # filet de sécurité (portfolio_controller = 40)
  max_positions_per_symbol: 6   # pipeline: 3 BUY + 3 SELL en HIGH CONF
  max_trades_per_day: 200       # 27 symboles × ~7 trades/jour

# ── Signal ─────────────────────────────────────────────────────────────
signal:
  min_score: 0.60               # Restauré 1er Juillet 2026

# ── Risk — FTMO-safe ────────────────────────────────────────────────
risk:
  per_trade_pct: 0.004          # 0.40% par trade
  max_daily_loss_pct: 0.02      # FTMO: 2% daily loss
  max_dd_pct: 0.10              # FTMO: 10% max drawdown
  min_rr_ratio: 1.5             # RR minimum
  cooldown_minutes: 15          # 15 min de refroidissement
  auto_pause_losses: 5          # 5 pertes avant pause
  max_risk_amount: 800.0        # $800 max risque par trade
  circuit_breaker_dd_pct: 0.08
