# ============================================================================
# PRODUCTION OVERRIDES — 5 Actifs Calibrés (Juin 2026)
# ============================================================================
# XAUUSD H4 : WR 71.9%, PF 1.11, DD 9.7%  — risk_mult 1.00, weekend_trading=false
# BTCUSD H1 : WR 74.6%, PF 1.17, DD 9.2%  — risk_mult 0.65, weekend_trading=true
# ETHUSD H4  : WR 70.5%, PF 1.03, DD 7.4%  — risk_mult 0.50 (corrélé BTC 0.89)
# US500.cash H4 : WR 72.3%, PF 1.00 — risk_mult 0.50, weekend_trading=false
# ============================================================================
# Fusionné avec default.yaml (deep merge).
# Seuls les champs qui surchargent default.yaml sont listés ici.
