# ============================================================================
# PRODUCTION OVERRIDES — 6 Actifs Actifs (25 Juin 2026)
# ============================================================================
# Corrélation RÉACTIVÉE — max 3 trades/groupe, max 2/direction.
# Paramètres FTMO-safe (RISK_PER_TRADE=0.44%, min_rr_ratio=2.0, auto_pause=8).
# AUDUSD, US500.cash désactivés (PF < 0.8 toxiques).
# Fusionné avec default.yaml (deep merge).
# ============================================================================

# ── Corrélation — Override production ───────────────────────────────────
correlation:
  enabled: true
  max_trades_per_group: 3
  max_trades_per_direction_in_group: 2

# ── Trading — Calibré (25 Juin 2026) ────────────────────────────────────
trading:
  max_positions: 20             # 6 symboles × ~4 positions max, limité par corrélation
  max_positions_per_symbol: 4   # max 4 par symbole (aligné pipeline conf>85%)
  max_trades_per_day: 30        # 6 symboles × ~5 trades/jour

# ── Signal ─────────────────────────────────────────────────────────────
signal:
  min_score: 0.55               # restauré valeur originale (avant Mode MAX 0.70)

# ── Symbol Limits — Calibration FTMO-safe ────────────────────────────
symbol_limits:
  XAUUSD:
    max_lot: 0.06               # calibré backtest
    risk_mult: 1.10             # WR 67.7%, PF 2.04 → star
    min_score: 0.70

  BTCUSD:
    max_lot: 0.06               # calibré backtest
    risk_mult: 0.60             # WR 41.9% → risque réduit
    min_score: 0.70

  EURUSD:
    max_lot: 0.10
    risk_mult: 1.00             # WR 76.6% → solide
    min_score: 0.70

  USDJPY:
    max_lot: 0.10
    risk_mult: 1.00
    min_score: 0.70

  GBPUSD:
    max_lot: 0.10
    risk_mult: 1.00
    min_score: 0.70

  USDCAD:
    max_lot: 0.10
    risk_mult: 1.00
    min_score: 0.70

# ── Risk — FTMO-safe (calibré 25 Juin 2026) ──────────────────────────
risk:
  per_trade_pct: 0.004          # 0.40% par trade (restauré calibré, était 0.44%)
  max_daily_loss_pct: 0.02      # FTMO: 2% daily loss
  max_dd_pct: 0.10              # FTMO: 10% max drawdown
  min_rr_ratio: 2.0             # RR≥2.0 obligatoire
  cooldown_minutes: 15          # 15 min de refroidissement
  auto_pause_losses: 5          # 5 pertes avant pause (restauré calibré, était 8)
  max_risk_amount: 800.0        # $800 max risque par trade (était $880)
  circuit_breaker_dd_pct: 0.08
