  # Backtest H4 12+ ans: WR 68.6%, PF 1.16, DD 6.9%
  #   → H1 perdant sur 12 ans (-$187K, DD 126.2%), mais profitable 2021-26
  #   → Migration H4 pour robustesse (DD 6.9% sûr FTMO)
  # ═══════════════════════════════════════════════════════════════════════
