# ── Market Regime — Détection des régimes de marché (regime.py) ────────────
market_regime:
  adx_trend_enter_default: 22    # Seuil ADX pour entrer en TREND (hystérésis)
  adx_trend_exit_default: 18     # Seuil ADX pour sortir du TREND (hystérésis)
  hysteresis_offset: 4           # Décalage entrée/sortie (22→18 = 4 points)
  slope_bullish: 0.002           # Pente MA20 > 0.2% = TREND_UP
  slope_bearish: -0.002          # Pente MA20 < -0.2% = TREND_DOWN
  vol_high_ratio: 0.015          # ATR > 1.5% du prix = HIGH_VOL
  vol_low_ratio: 0.003           # ATR < 0.3% du prix = LOW_VOL

# ── Auto-Stop — Pause/reprise automatique (auto_stop.py) ──────────────────
auto_stop:
  adx_low_threshold: 22          # ADX < 22 = RANGING
  adx_high_threshold: 18         # ADX >= 18 = TRENDING
  ratio_stop: 0.50               # >50% des symboles en ranging → STOP
  symbols_min_resume: 2          # >=2 symboles ADX>=22 → RESUME
  pause_min_duration: 1800       # 30 min de pause minimum
  adx_snapshot_ttl: 300          # snapshot ADX valide 5 min
  state_ttl: 86400               # état max 24h

# ── Corrélation — Groupes de symboles corrélés ────────────────────────────
# RÈGLE: max 3 trades TOTAL par groupe, max 2 dans la même DIRECTION.
# Empêche les pertes simultanées sur symboles à corrélation élevée.
# Justification: 8 symboles actifs dont 5 FOREX_MAJORS corrélés USD.
#   Événement macro (NFP, FOMC, CPI) → toutes les paires USD impactées.
#   Corrélation Pearson H1 12+ ans: EURUSD/GBPUSD=0.70, EURUSD/USDCHF=0.65, etc.
# Réactivé 25 Juin 2026 — Risk & Compliance Officer
# ============================================================================
correlation:
  enabled: true
  max_trades_per_group: 3              # max 3 positions TOTAL dans un groupe corrélé
  max_trades_per_direction_in_group: 2 # max 2 positions dans la même direction dans un groupe
  groups:
    FOREX_MAJORS:
      symbols: ["EURUSD", "GBPUSD", "USDCHF", "USDCAD", "AUDUSD", "NZDUSD", "USDJPY"]
      reason: "Paires USD → corrélées entre elles (Pearson 0.50-0.70 H1)"
    CRYPTO:
      symbols: ["BTCUSD", "ETHUSD", "SOLUSD", "LNKUSD", "BNBUSD"]
      reason: "Cryptos corrélées au Bitcoin (Pearson 0.75-0.89)"
    INDICES:
