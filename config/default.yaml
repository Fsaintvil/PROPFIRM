# ============================================================================
# CONFIGURATION PAR DÉFAUT — FTMO 200K Challenge (1er Juillet 2026)
#
# ⚠️ ATTENTION — DUAL SOURCE OF TRUTH ⚠️
# Ce fichier est la DOCUMENTATION des paramètres de signal.
# La VRAIE source est strategy.py:SYMBOL_CONFIG qui contient les paramètres
# techniques (momentum_period, thresholds SL/TP, ADX slope, cmf_threshold).
# Un changement ici n'affecte PAS les signaux réels.
# Pour modifier un paramètre de signal, changer strategy.py.
#
# 8 actifs : XAUUSD (H4), BTCUSD (H1), EURUSD (H1),
#            USDJPY (H1), GBPUSD (H1), USDCAD (H1)
# Corrélation désactivée — tous les symboles tradent sans restriction.
# Lots augmentés de 10% sur tous les symboles.
# Aucun paramètre identique entre deux actifs sans justification statistique.
# ============================================================================
# Chaque paramètre est justifié par:
#   - Backtest 12+ ans (158,964 trades, H1/H4/D1)
#   - Backtest production avec coûts (spread, slippage, commission)
#   - Walk-forward p-value, Monte Carlo 1000 simulations
#   - Règles FTMO (DD 10%, daily loss 2%, consistency 30%)
#   - Caractéristiques de volatilité propres à chaque actif
# ============================================================================
---
robot:
  magic: 999001
  cycle_seconds: 15
  version: "4.1.0"

# ── Trading ──────────────────────────────────────────────────────────────
trading:
  symbols:
    # ── FOREX MAJORS ────────────────────────────────────────────────────
    - EURUSD
    - GBPUSD
    - USDCHF
    - USDCAD
    - AUDUSD
    - NZDUSD
    - USDJPY
    # ── FOREX CROSSES ───────────────────────────────────────────────────
    - EURJPY
    - GBPJPY
    - EURGBP
    - AUDJPY
    # ── CRYPTO ──────────────────────────────────────────────────────────
    - BTCUSD
    - ETHUSD
    - SOLUSD
    - LNKUSD
    - BNBUSD
    # ── INDICES ─────────────────────────────────────────────────────────
    - US500.cash
    - US30.cash
    - US100.cash
    - JP225.cash
    # ── EUROPE INDICES ──────────────────────────────────────────────────
    - GER40.cash
    - UK100.cash
    # ── COMMODITIES ─────────────────────────────────────────────────────
    - XAUUSD
    - XAGUSD
    - USOIL.cash
    - UKOIL.cash
    - NATGAS.cash

  # Limites globales — 27 symboles (synchronisé 1er Juillet 2026)
  max_positions: 40             # filet de sécurité (portfolio_controller = 40)
  max_positions_per_symbol: 6   # max 6/symbole (pipeline: 3 BUY + 3 SELL en HIGH CONF)
  max_trades_per_day: 200       # 27 symboles × ~7 trades/jour
  max_signals_per_cycle: 25     # marge pour signaux simultanés (plafond schema 25)
  max_orders_per_minute: 25     # ~1 trade/min/symbole (plafond schema 25)
  lot_size: 0.01                # lot de démarrage (WR progressif)
  min_trade_interval_sec: 120   # 2 min minimum entre trades par symbole
  batch_interval_sec: 5         # 5s
  trading_start_hour: 0
  trading_end_hour: 24          # 24/7 — sans arret
  danger_hours: [7, 17]         # 07:00=fermeture Asie (25% WR, -$318) / 17:00=fermeture Europe (21.7% WR, -$218) — Supreme Council 28 Juin
  history_lookback_days: 7

# ── Signal ───────────────────────────────────────────────────────────────
signal:
  min_score: 0.70               # ↑ 0.60→0.70 1er Juillet 2026 — conf minimum FTMO-safe
  daily_profit_limit_pct: 0.008  # 0.8% profit/jour max (FTMO consistency)

# ── Risque FTMO ─────────────────────────────────────────────────────────
risk:
  # --- Règles FTMO obligatoires ---
  max_daily_loss_pct: 0.02       # 2% daily loss max (règle FTMO)
  max_dd_pct: 0.10               # 10% DD max (règle FTMO)
  profit_target_pct: 0.10        # 10% profit target ($20K sur 200K)
  consistency_max_pct: 0.30      # 30% max un jour / total profit
  min_trading_days: 10           # 10 jours minimum FTMO
  max_trading_days: 0            # pas de limite max

  # --- Risque par trade ---
  per_trade_pct: 0.004           # 0.40% par trade (restauré calibré, était 0.44%)
  short_mult: 1.0                # même risque long/short
  max_risk_amount: 800.0         # $800 max risque par trade (restauré calibré, était $880)

  # --- Qualité ---
  min_rr_ratio: 1.5              # ↓ 2.0→1.5 26 Juin — plus de trades (RR moyen des signaux est ~1.9)
  atr_multiplier: 1.5            # multiplicateur ATR pour SL

  # --- Cooldown ---
  cooldown_minutes: 15          # 15min de refroidissement après perte
  auto_pause_losses: 5           # 5 pertes avant pause automatique (restauré calibré, était 8-6)

  # --- Volatilité ---
  max_spread_points: 120         # spread max global (overridden par symbole)

  # --- Circuit breaker ---
  circuit_breaker_dd_pct: 0.08   # 8% DD → arrêt d'urgence

  # --- Recalibration ---
  recalibration_frequency: 50    # recalib ML tous les 50 trades

# ── Symbol Limits — 27 symboles actifs (1er Juillet 2026)
