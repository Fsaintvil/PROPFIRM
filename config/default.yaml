    sl_atr_trending: 1.8        # SL 1.8×ATR (ATR H4 ~90pts → SL ~162pts — était 2.0)
    tp_atr_trending: 5.0        # TP 5.0×ATR (RR 2.78 — inchangé, validé)
    sl_atr_ranging: 1.5         # SL 1.5×ATR (inchangé)
    tp_atr_ranging: 3.5         # TP 3.5×ATR ranging (RR 2.33 — était 4.0, plus réaliste H4)
    adx_slope_threshold: -8.0              # restauré standard AGENTS.md (était -14.0)
    adx_slope_threshold_strong: -8.0       # XAUUSD H4 pas de relaxation (même seuil)
    # Seuils momentum synchronisés avec strategy.py (25 Juin 2026)
    threshold_trending: 2.0     # mode modéré (×0.8 vs standard 2.5)
    threshold_ranging: 1.5      # mode modéré (×0.75 vs standard 2.0)
