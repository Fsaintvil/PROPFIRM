# Configuration par défaut — valeurs sûres pour FTMO 200K
# Les variables ${VAR} sont interpolées depuis l'environnement (.env)
---
robot:
  magic: 999001
  cycle_seconds: 15
  version: "3.2.0"

trading:
  symbols:
    - USDCAD     # 385 trades, 72.2% WR, +$2,728
    - GBPUSD     # 92 trades, 70.7% WR, +$650 (live: 19% WR — risk_mult=0.3)
    - USDCHF     # 41 trades, 54% WR, +$82
    - EURUSD     # 49 trades, 49% WR, +$74 (live: 29% WR — risk_mult=0.5)
    - AUDUSD     # 18 trades, 61% WR, -$80
    - XAUUSD     # 13 trades live, $+387, 61.5% WR, PF 4.51 ★
    - NZDUSD     # 7 trades live, $+48, 100% WR ★
  max_positions: 10
  max_positions_per_symbol: 2
  max_trades_per_day: 8
  max_signals_per_cycle: 3
  max_orders_per_minute: 6
  lot_size: 0.05
  min_trade_interval_sec: 60
  trading_start_hour: 0
  trading_end_hour: 24

signal:
  min_score: 0.65
  daily_profit_limit_pct: 0.008

risk:
  per_trade_pct: 0.004
  short_mult: 1.0
  max_daily_loss_pct: 0.02
  zone2_loss_pct: 0.012
  zone3_loss_pct: 0.017
  max_dd_pct: 0.10
  profit_target_pct: 0.10
  consistency_max_pct: 0.30
  min_rr_ratio: 1.95
  atr_multiplier: 1.5
  cooldown_minutes: 30
  min_trading_days: 10
  max_trading_days: 0
  max_risk_amount: 800.0
  max_spread_points: 50
  auto_pause_losses: 3
  recalibration_frequency: 50

symbol_limits:
  USDCAD:
    max_lot: 1.0
    min_lot: 0.5
    risk_mult: 1.0
    max_spread_points: 50
    min_score: 0.55
    adx_thresh: 20
    allow_buys: true
    allow_shorts: true
  GBPUSD:
    max_lot: 1.0
    min_lot: 0.5
    risk_mult: 0.3          # ⬇ réduit : 19.2% WR en live, perdant
    max_spread_points: 50
    min_score: 0.65
    adx_thresh: 24          # ⬆ plus sélectif : que sur bonnes tendances
    allow_buys: true
    allow_shorts: true
  USDCHF:
    max_lot: 1.0
    min_lot: 0.5
    risk_mult: 0.8
    max_spread_points: 50
    min_score: 0.55
    adx_thresh: 18
    allow_buys: true
    allow_shorts: true
  EURUSD:
    max_lot: 1.0
    min_lot: 0.5
    risk_mult: 0.5          # ⬇ réduit car 29% WR en live (110 trades)
    max_spread_points: 40
    min_score: 0.70          # ⬆ monté pour filtrer les trades de mauvaise qualité
    adx_thresh: 20
    allow_buys: true
    allow_shorts: true
    allow_ranging: false     # éviter les trades en range (cause du faible WR)
  AUDUSD:
    max_lot: 1.0
    min_lot: 0.5
    risk_mult: 1.0
    max_spread_points: 40
    min_score: 0.60
    adx_thresh: 16
    allow_buys: true
    allow_shorts: true
  XAUUSD:
    max_lot: 0.15
    min_lot: 0.01
    risk_mult: 1.0
    max_spread_points: 80
    min_score: 0.60
    adx_thresh: 20
    allow_buys: true
    allow_shorts: true
  NZDUSD:
    max_lot: 1.0
    min_lot: 0.5
    risk_mult: 1.0
    max_spread_points: 50
    min_score: 0.60
    adx_thresh: 20
    allow_buys: true
    allow_shorts: true

ml:
  experiment_tracking: true
  tracking_uri: "${MLFLOW_TRACKING_URI}"
  retraining:
    days: 90
    min_samples: 50
    epochs: 10
    n_splits: 5
    schedule_trades: 500        # retrain tous les N trades fermes
    log_mlflow: true
  concept_drift:
    enabled: true
    window_size: 100
    psi_threshold_light: 0.10
    psi_threshold_moderate: 0.20
    psi_threshold_severe: 0.25
    auto_retrain: true
    retrain_cooldown_hours: 24

news:
  enabled: true
  minutes_before: 5    # FTMO: 2 min mini, on utilise 5 pour securite
  minutes_after: 5     # FTMO: 2 min mini, on utilise 5 pour securite
  manual_file: "config/economic_events.json"

secrets:
  mt5_login: "${MT5_LOGIN}"
  mt5_password: "${MT5_PASSWORD}"
  mt5_server: "${MT5_SERVER}"
  telegram_bot_token: "${TELEGRAM_BOT_TOKEN}"
  telegram_chat_id: "${TELEGRAM_CHAT_ID}"
