    # BTCUSD H1: volume crypto "bursty" (médiane 3,012 vs moyenne 109,535 — ×36)
    #   CMF ±0.10 trop sensible → 35.3% des signaux pénalisés (faux positifs)
    #   OBV divergence 0.70 trop agressif → 21.2% des signaux impactés
    #   Seuils relevés pour réduire les faux rejets sur signaux MOM20x3 valides
    cmf_threshold: 0.20          # ↑ 0.10→0.20 : CMF moins sensible sur volume bursty crypto
    obv_div_penalty_high: 0.85   # ↑ 0.70→0.85 : OBV forte divergence moins pénalisante
    obv_div_penalty_low: 0.92    # ↑ 0.85→0.92 : OBV faible divergence moins pénalisante
