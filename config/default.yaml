robot:
  magic: 999001
  cycle_seconds: 15
  version: "4.1.0"

# ── Trading ──────────────────────────────────────────────────────────────
trading:
  symbols:
    - XAUUSD      # H4 — WR 68.6%, PF 1.16, DD 6.9% (backtest 12+ ans)
    - BTCUSD      # H1 — WR 32.3% Phase 3, PF 0.71, risk_mult=0.0 (DÉSACTIVÉ 23 Juin)
