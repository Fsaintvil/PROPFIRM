# ── Market Regime — Détection des régimes de marché (regime.py) ────────────
market_regime:
  adx_trend_enter_default: 22    # Seuil ADX pour entrer en TREND (hystérésis)
  adx_trend_exit_default: 18     # Seuil ADX pour sortir du TREND (hystérésis)
  hysteresis_offset: 4           # Décalage entrée/sortie (22→18 = 4 points)
  slope_bullish: 0.002           # Pente MA20 > 0.2% = TREND_UP
  slope_bearish: -0.002          # Pente MA20 < -0.2% = TREND_DOWN
  vol_high_ratio: 0.015          # ATR > 1.5% du prix = HIGH_VOL
  vol_low_ratio: 0.003           # ATR < 0.3% du prix = LOW_VOL

# ── Auto-Stop — Pause/reprise automatique (auto_stop.py) ──────────────────
auto_stop:
  adx_low_threshold: 22          # ADX < 22 = RANGING
  adx_high_threshold: 18         # ADX >= 18 = TRENDING
  ratio_stop: 0.50               # >50% des symboles en ranging → STOP
  symbols_min_resume: 2          # >=2 symboles ADX>=22 → RESUME
  pause_min_duration: 1800       # 30 min de pause minimum
  adx_snapshot_ttl: 300          # snapshot ADX valide 5 min
  state_ttl: 86400               # état max 24h

# ── Corrélation — Groupes de symboles corrélés ────────────────────────────
# RÈGLE: max 3 trades TOTAL par groupe, max 2 dans la même DIRECTION.
# Empêche les pertes simultanées sur symboles à corrélation élevée.
# 27 symboles répartis en 6 groupes (1er Juillet 2026).
# Corrélation Pearson H1 12+ ans: EURUSD/GBPUSD=0.70, EURUSD/USDCHF=0.65, etc.
# Réactivé 25 Juin 2026 — Risk & Compliance Officer
# ============================================================================
correlation:
  enabled: true                   # RÉACTIVÉ 1er Juillet 2026 — protection pertes corrélées
  max_trades_per_group: 3
  max_trades_per_direction_in_group: 2
  groups:
    FOREX_MAJORS:
      symbols: ["EURUSD", "GBPUSD", "USDCHF", "USDCAD", "AUDUSD", "NZDUSD", "USDJPY"]
      description: "7 paires forex majeures corrélées USD"
    FOREX_CROSSES:
      symbols: ["EURJPY", "GBPJPY", "EURGBP", "AUDJPY"]
      description: "4 paires forex crosses"
    CRYPTO:
      symbols: ["BTCUSD", "ETHUSD", "SOLUSD", "LNKUSD", "BNBUSD"]
      description: "5 cryptos (volatilité corrélée)"
    INDICES:
      symbols: ["US500.cash", "US30.cash", "US100.cash", "JP225.cash", "GER40.cash", "UK100.cash"]
      description: "6 indices actions"
    COMMODITIES:
      symbols: ["XAUUSD", "XAGUSD", "USOIL.cash", "UKOIL.cash", "NATGAS.cash"]
      description: "5 matières premières"

# ── ML Pipeline ──────────────────────────────────────────────────────────
ml:
  experiment_tracking: false    # ML désactivé (pas de modèle entraîné)
  tracking_uri: ""
  retraining:
    days: 90
    min_samples: 50
    epochs: 10
    n_splits: 5
    schedule_trades: 500
    log_mlflow: false
  concept_drift:
    enabled: false              # Désactivé tant que ML non opérationnel
    window_size: 100
    psi_threshold_light: 0.10
    psi_threshold_moderate: 0.20
    psi_threshold_severe: 0.25
    auto_retrain: false
    retrain_cooldown_hours: 24

# ── News Filter ──────────────────────────────────────────────────────────
news:
  enabled: true
  minutes_before: 5             # défaut global (overridden par symbole)
  minutes_after: 5
  manual_file: "config/economic_events.json"

# ── Secrets ──────────────────────────────────────────────────────────────
secrets:
  mt5_login: "${MT5_LOGIN}"
  mt5_password: "${MT5_PASSWORD}"
  mt5_server: "${MT5_SERVER}"
  telegram_bot_token: "${TELEGRAM_BOT_TOKEN}"
  telegram_chat_id: "${TELEGRAM_CHAT_ID}"
