    adx_thresh: 22              # ADX hystérésis 22 entrée / 18 sortie
    allow_buys: true
    allow_shorts: true
    # --- Calibration XAUUSD H4 (Juin 2026) ---
    # Justification: Or H4 = tendances longues, volatilité modérée (ATR~90-100pts H4).
    #   - Période 20 (vs 15) : H4 → 20 bougies = 80h de momentum (vs 60h, plus robuste)
    #   - SL 1.8×ATR (vs 2.0) : plus serré possible en H4 (ATR ~$15-20 → SL $27-36)
    #   - TP 5.0×ATR (inchangé) : RR 2.78, validé backtest 12+ ans
    #   - TP ranging 3.5 (vs 4.0) : ranging H4 dure moins longtemps → TP plus proche
    #   - ADX slope -8.0 (vs -6.0) : plus strict sur H4 (tendances plus pures)
    #   - ADX slope strong -12.0 (vs -10.0) : idem pour signaux forts
    #   - Pullback bandes plus larges (0.5/0.3 vs 0.4/0.25) : pullbacks H4 plus larges
    #   - Trailing lock 0.8 (vs 1.0) : tendances H4 longues → lock plus tôt
    #   - Trailing n1 0.60 (vs 0.80) : trailing plus serré en trending H4
    #   - Sessions 13-22 (vs 13-20) : inclut London PM fix (17-18h) + US afternoon
    # Sources: backtest 12+ ans H4 (WR 68.6%, PF 1.16, DD 6.9%), données live FTMO
