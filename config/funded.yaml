# ============================================================================
# FUNDED ACCOUNT CONFIG — À appliquer APRÈS le PASS du challenge FTMO
# ============================================================================
# Ce fichier contient les overrides à appliquer une fois le compte financé obtenu.
# Les règles FTMO en phase Funded sont généralement les mêmes qu'en challenge,
# mais la gestion du risque doit être PLUS CONSERVATRICE pour protéger le capital.
# ============================================================================
# Instructions:
#   Copier le contenu dans production.yaml après le PASS,
#   ou utiliser: python -c "import yaml; ...
# ============================================================================

# ── Trading — Mode Funded (conservateur) ──────────────────────────────────
trading:
  max_positions: 4              # ↓ Réduit (protection du capital financé)
  max_positions_per_symbol: 2   # Inchangé
  max_trades_per_day: 40        # ↓ Moitié du challenge

# ── Risque — Funded ───────────────────────────────────────────────────────
risk:
  per_trade_pct: 0.0025         # 0.25% au lieu de 0.40% (risque réduit de 37.5%)
  max_risk_amount: 500.0        # $500 max au lieu de $800
  max_daily_loss_pct: 0.01      # 1% daily loss (au lieu de 2%)
  max_dd_pct: 0.08              # 8% DD max (au lieu de 10%)
  circuit_breaker_dd_pct: 0.05  # 5% DD → arrêt d'urgence (au lieu de 8%)
  cooldown_minutes: 10          # 10 min après perte (au lieu de 5)
  auto_pause_losses: 5          # 5 pertes consécutives → pause (au lieu de 10)
  profit_target_pct: 0          # Pas de profit target en Funded
  min_trading_days: 0           # Pas de minimum de jours

# ── Symbol Limits — Funded (encore plus conservateur) ─────────────────────
symbol_limits:
  XAUUSD:
    risk_mult: 0.80             # ↓ 1.00→0.80 en Funded
    max_lot: 0.08               # ↓ 0.10→0.08
  BTCUSD:
    risk_mult: 0.50             # ↓ 0.65→0.50 en Funded
    max_lot: 0.02               # ↓ 0.03→0.02
  ETHUSD:
    risk_mult: 0.35             # ↓ 0.50→0.35 en Funded
  EURUSD:
    risk_mult: 0.50             # ↓ 0.75→0.50 en Funded
