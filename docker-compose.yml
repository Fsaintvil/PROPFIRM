version: "3.9"

services:
  robot:
    build: .
    container_name: mt5_ftmo_robot
    restart: unless-stopped
    volumes:
      - ./runtime:/app/runtime
      - ./models:/app/models
      - ./logs:/app/logs
      - ./config:/app/config
      - ./mlruns:/app/mlruns
    env_file:
      - .env
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:9090/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.1
    container_name: mt5_ftmo_mlflow
    restart: unless-stopped
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root ./mlartifacts
    volumes:
      - ./mlruns:/mlruns
      - ./mlartifacts:/mlartifacts
    ports:
      - "5000:5000"
